services:
  - type: web
    name: ai-rpg
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn web_app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: API_KEY
        sync: false
      - key: BASE_URL
        value: https://api.deepseek.com
      - key: PARSER_MODEL
        value: deepseek-chat
      - key: NARRATOR_MODEL
        value: deepseek-chat
    plan: free
